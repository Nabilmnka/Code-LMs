<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parkour Flow</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="overlay">
      <div class="panel">
        <h1>Parkour Flow</h1>
        <p>انقر بالفأرة لبدء اللعب (سيم تفعيل مؤشر الماوس).</p>
        <ul>
          <li>الحركة: WASD</li>
          <li>قفز: Space</li>
          <li>انزلاق: Ctrl</li>
          <li>إعادة: R</li>
          <li>التقاط الحافة/التسلق: E</li>
          <li>توقيف/استئناف المؤقت: T</li>
        </ul>
      </div>
    </div>

    <div id="hud">
      <div id="timer">00:00.000</div>
      <div id="momentum">
        <div id="bar"></div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
